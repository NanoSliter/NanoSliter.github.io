<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Nano Snake - Multiplayer Spiel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Startbildschirm -->
    <div id="startScreen">
        <div class="logo">
            <h1>NANO SNAKE</h1>
            <p>Die ultimative Schlangenarena!</p>
        </div>

        <div class="form-container">
            <input type="text" id="playerName" placeholder="Gib deinen Schlangennamen ein">
            <br>
            <label for="serverSelect">Wähle einen Server:</label>
            <select id="serverSelect"></select>
            <br>
            <button onclick="joinGame()">SPIEL STARTEN</button>
        </div>

        <div class="info-box">
            <h3>Features:</h3>
            <ul>
                <li>100 Server mit jeweils bis zu 15 Spielern</li>
                <li>Power-ups & Bots</li>
                <li>Freundesliste & Positions-Anzeige</li>
                <li>Nukte nach Tod</li>
                <li>Upgrades kaufen</li>
            </ul>
        </div>
    </div>

    <!-- Spielbereich -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- Socket.io CDN -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
