<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Nano Sliter — Offline Multiplayer-Ready</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #050815;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #start {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            z-index: 100;
        }
        #start h1 {
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0,243,255,0.7);
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        #start input, #start select {
            width: 300px;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #00f3ff;
            background: #000;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
        }
        #start button {
            background: linear-gradient(45deg, #00f3ff, #00aaee);
            color: black;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            transition: transform 0.2s;
        }
        #start button:hover {
            transform: scale(1.03);
        }
        #game {
            display: none;
            background: #000a1a;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f3ff;
            font-size: 18px;
            text-shadow: 0 0 5px #00f3ff;
        }
    </style>
</head>
<body>
    <div id="start">
        <h1>🐍 Nano Sliter v7</h1>
        <input type="text" id="nickname" placeholder="Name (max. 12)" value="Du">
        <select id="room">
option value="lobby1">Raum: lobby1</option>
            <option value="lobby2">Raum: lobby2</option>
        </select>
        <button onclick="startGame()">▶️ SPIELEN</button>
    </div>
    <canvas id="game" width="1200" height="800"></canvas>
    <div id="ui">
        Punkte: <span id="points">0</span> | Länge: <span id="length">5</span>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const startEl = document.getElementById('start');
        const uiPoints = document.getElementById('points');
        const uiLength = document.getElementById('length');

        let player = null;
        let foods = [];
        let nuktes = [];

        // --- Initialisiere Spiel ---
        function startGame() {
            const name = document.getElementById('nickname').value.trim() || 'Anonym';
            const room = document.getElementById('room').value;

            startEl.style.display = 'none';
            canvas.style.display = 'block';

            // Spieler mit Körper
            player = {
                x: 600,
                y: 400,
                size: 5,
                points: 0,
                segments: [],
                speed: 3,
                angle: 0
            };

            for (let i = 0; i < 5; i++) {
                player.segments.push({
                    x: 600 - i * 5,
                    y: 400,
                    size: 5 - i * 0.3
                });
            }

            // Nahrung generieren
            for (let i = 0 i < 50; i++) {
                foods.push({
                    x: Math.random() * 1000,
                    y: Math.random() * 600,
                    r: 4
                });
            }

            gameLoop();
        }

        // --- Zeichnen ---
        function drawHexGrid() {
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.02)';
            ctx.lineWidth = 1;
            const size = 25;
            for (let x = -size; x < canvas.width; x += size * 1.5) {
                for (let y = -size; y < canvas.height; y += size * Math.sqrt(3)) {
                    const ox = (Math.floor(y / (size * Math.sqrt(3))) % 2) * (size * 0.75);
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const a = (i * Math.PI) / 3;
                        const nx = x + ox + size * Math.cos(a);
                        const ny = y + size * Math.sin(a);
                        if (i === 0) ctx.moveTo(nx, ny);
                        else ctx.lineTo(nx, ny);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }
            }
        }

        function drawSnake() {
            for (let i = player.segments.length - 1; i >= 0; i--) {
                const seg = player.segments[i];
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, seg.size || player.size, 0, Math.PI * 2);
                ctx.fillStyle = i === 0 ? '#00ffaa' : '#00cc88';
                ctx.fill();
            }
        }

        function drawFoods() {
            foods.forEach(f => {
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                ctx.fillStyle = '#ffcc00';
                ctx.fill();
            });
        }

        // --- Update ---
        function update() {
            if (!player) return;

            // Kopf bewegen
            const head = player.segments[0];
            head.x += Math.cos(player.angle) * player.speed;
            head.y += Math.sin(player.angle) * player.speed;

            // Körper nachziehen
            for (let i = 1; i < player.segments.length; i++) {
                const curr = player.segments[i];
                const prev = player.segments[i - 1];
                const dx = prev.x - curr.x;
                const dy = prev.y - curr.y;
                const d = Math.sqrt(dx * dx + dy * dy);
                if (d > 2) {
                    curr.x += dx * 0.7;
                    curr.y += dy * 0.7;
                }
            }

            // Kollision mit Nahrung
            foods = foods.filter(f => {
                const d = Math.hypot(head.x - f.x, head.y - f.y);
                if (d < head.size + f.r) {
                    player.points += 10;
                    player.size += 0.2;
                    player.segments.push({
                        x: player.segments[player.segments.length - 1].,
                        y: player.segments[player.segments.length - 1].y,
                        size: Math.max(1, player.size - player.segments.length * 0.1)
                    });
                    return false;
                }
                return true;
            });

            // Begrenzung
            if (head.x < 0) head.x = canvas.width;
            if (head.x > canvas.width) head.x = 0;
            if (head.y < 0) head.y = canvas.height;
            if (head.y > canvas.height) head.y = 0;

            // UI aktualisieren
            uiPoints.textContent = Math.floor(player.points);
            uiLength.textContent = player.segments.length;
        }

        // --- Game Loop ---
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawHexGrid();
            drawFoods();
            drawSnake();
            update();
            requestAnimationFrame(gameLoop);
        }

        // --- Steuerung ---
        canvas.addEventListener('mousemove', (e) => {
            if (!player) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            player.angle = Math.atan2(my - player.segments[0].y, mx - player.segments[0].x);
        });

        // --- Starte beim Laden ---
        window.onload = () => {
            // Button ist jetzt klickbar — kein Fehler mehr
            console.log("✅ Bereit: Klicke auf 'SPIELEN'");
        };
    </script>
</body>
</html>
