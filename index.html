<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Nano Sliter — P2P Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="startScreen">
        <h1>🐍 Nano Sliter v5 — P2P</h1>
        <input type="text" id="nickname" placeholder="Name" maxlength="12">
        <input type="text" id="room" placeholder="Raumname (z.B. lobby1)" value="lobby1">
        <button onclick="joinRoom()">Spielen</button>
    </div>
    <canvas id="game" width="1200" height="800"></canvas>
    <div id="ui">
        Punkte: <span id="points">0</span> | Länge: <span id="length">5</span>
    </div>

    <!-- SimplePeer -->
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/min.js"></script>
    <script src="script.js"></script>
</body>
</html>
