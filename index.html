<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Nano Sliter v3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="startScreen">
        <h1>🐍 Nano Sliter v3</h1>
        <input type="text" id="playerName" placeholder="Name eingeben">
        <select id="serverSelect"></select>
        <button onclick="joinGame()">Spielen</button>
    </div>

    <canvas id="gameCanvas" width="1200" height="800"></canvas>

    <div id="ui">
        <div>Punkte: <span id="points">0</span></div>
        <div>Länge: <span id="length">5</span></div>
        <button onclick="openShop()">🛒 Shop</button>
        <button onclick="openFriends()">👥 Freunde</button>
    </div>

    <div id="shopModal" class="modal">
        <div><button onclick="buyUpgrade('size')">Größe +1 (300 Pkt)</button></div>
        <div><button onclick="buyUpgrade('speed')">Geschwindigkeit +1 (500 Pkt)</button></div>
        <div><button onclick="buyBot()">Bot kaufen (1000 Pkt)</button></div>
        <button onclick="closeModal()">Schließen</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
